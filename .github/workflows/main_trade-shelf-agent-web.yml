name: trade-shelf-agent-web

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      npm_config_cache: /home/runner/.npm
      TMPDIR: /home/runner/tmp
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Prepare tmp dirs
        run: |
          mkdir -p /home/runner/.npm
          mkdir -p /home/runner/tmp

      - name: Install dependencies (root)
        run: npm ci

      - name: Install dependencies (packages/shared)
        run: npm ci --prefix packages/shared

      - name: Build
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    env:
      npm_config_cache: /home/runner/.npm
      TMPDIR: /home/runner/tmp
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Prepare tmp dirs
        run: |
          mkdir -p /home/runner/.npm
          mkdir -p /home/runner/tmp

      - name: Install dependencies (root)
        run: npm ci

      - name: Install dependencies (packages/shared)
        run: npm ci --prefix packages/shared

      - name: Build
        run: npm run build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
