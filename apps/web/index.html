<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trade Shelf Agent (UI Mock)</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__title">Trade Shelf Agent</div>
      <div class="topbar__subtitle">UI mock: 左 Inbox / 右 Shelf</div>
      <div class="topbar__actions">
        <button id="btn-seed" class="btn btn--ghost" type="button">サンプル投入</button>
        <button id="btn-clear" class="btn btn--ghost" type="button">クリア</button>
      </div>
    </header>

    <main class="layout">
      <section class="pane pane--inbox" aria-label="Inbox">
        <div class="pane__header">
          <h2 class="pane__title">Inbox（ぶち込み箱）</h2>
          <div class="pane__meta">
            <span id="inbox-count" class="badge">0 items</span>
          </div>
        </div>

        <div id="dropzone" class="dropzone" tabindex="0" role="button" aria-label="Drag and drop files here">
          <div class="dropzone__title">ドラッグ＆ドロップ</div>
          <div class="dropzone__hint">ファイルでも、テキストでも、とにかく放り込む</div>
          <input id="file-input" class="dropzone__file" type="file" multiple />
          <button id="btn-pick" class="btn" type="button">ファイルを選ぶ</button>
        </div>

        <div class="inbox-compose">
          <label class="label" for="text-input">テキスト投入（メール本文 / メモ / OCR など）</label>
          <textarea
            id="text-input"
            class="textarea"
            placeholder="例: SI 1000 / INV 400 の差異が発生。仕入先へ確認したい。"
            rows="6"
          ></textarea>
          <div class="row">
            <button id="btn-add-text" class="btn" type="button">追加</button>
            <div class="muted">※ ここはただの箱。分類は右側で「棚っぽく」やります。</div>
          </div>
        </div>

        <div class="inbox-list">
          <div class="label">投入済み</div>
          <div id="inbox-items" class="items"></div>
        </div>
      </section>

      <section class="pane pane--shelf" aria-label="Shelves">
        <div class="pane__header">
          <h2 class="pane__title">Shelf（状態別の棚）</h2>
          <div class="pane__meta">
            <span class="muted">クリックで提案→承認モーダル（ダミー）</span>
          </div>
        </div>

        <div class="shelves" id="shelves">
          <div class="shelf" data-shelf="出荷待ち">
            <div class="shelf__head">
              <div class="shelf__title">出荷待ち</div>
              <div class="shelf__count" data-count>0</div>
            </div>
            <div class="shelf__body" data-body></div>
          </div>
          <div class="shelf" data-shelf="書類不足">
            <div class="shelf__head">
              <div class="shelf__title">書類不足</div>
              <div class="shelf__count" data-count>0</div>
            </div>
            <div class="shelf__body" data-body></div>
          </div>
          <div class="shelf" data-shelf="返信待ち">
            <div class="shelf__head">
              <div class="shelf__title">返信待ち</div>
              <div class="shelf__count" data-count>0</div>
            </div>
            <div class="shelf__body" data-body></div>
          </div>
          <div class="shelf" data-shelf="通関中">
            <div class="shelf__head">
              <div class="shelf__title">通関中</div>
              <div class="shelf__count" data-count>0</div>
            </div>
            <div class="shelf__body" data-body></div>
          </div>
          <div class="shelf" data-shelf="完了">
            <div class="shelf__head">
              <div class="shelf__title">完了</div>
              <div class="shelf__count" data-count>0</div>
            </div>
            <div class="shelf__body" data-body></div>
          </div>
        </div>

        <div class="log">
          <div class="log__head">
            <div class="pane__title pane__title--small">Activity log（対応ログ）</div>
            <button id="btn-incident" class="btn btn--ghost" type="button">インシデント発生（ダミー）</button>
          </div>
          <div id="log-items" class="log__items"></div>
        </div>
      </section>
    </main>

    <div id="modal" class="modal" aria-hidden="true">
      <div class="modal__backdrop" data-close></div>
      <div class="modal__dialog" role="dialog" aria-modal="true" aria-label="Approval">
        <div class="modal__title">提案（承認が必要）</div>
        <div id="modal-body" class="modal__body"></div>
        <div class="modal__actions">
          <button id="btn-approve" class="btn btn--primary" type="button">承認して実行（ダミー）</button>
          <button class="btn btn--ghost" type="button" data-close>キャンセル</button>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
