<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trade Shelf Agent (UI Mock)</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "@trade-shelf/shared": "./vendor/shared/index.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="app"></div>

    <!-- Ingestion settings (mock) -->
    <div id="ingestion-modal" class="modal modal--ingestion" aria-hidden="true">
      <div class="modal__backdrop" data-close></div>
      <div class="modal__dialog" role="dialog" aria-modal="true" aria-label="Ingestion settings">
        <div class="modal__top">
          <div class="modal__title">Ingestion</div>
          <button class="btn btn--ghost" type="button" data-close aria-label="Close">閉じる</button>
        </div>
        <div class="modal__body">
          <div class="muted">（mock）メール/Drive連携、同期状況、例外投入などの設定パネルをここに置く</div>
        </div>
      </div>
    </div>

    <div id="modal" class="modal modal--tradecase" aria-hidden="true">
      <div class="modal__backdrop" data-close></div>
      <div class="modal__dialog" role="dialog" aria-modal="true" aria-label="Trade case detail">
        <div class="modal__top">
          <button id="btn-back" class="btn btn--ghost btn--back" type="button" data-close aria-label="Back to Shelf">
            <span class="btn--back__arrow">←</span>
            <span class="btn--back__ja">棚へ戻る</span>
            <span class="btn--back__en">Back to Shelf</span>
          </button>
          <div class="modal__title">案件詳細</div>
          <button id="btn-close" class="btn btn--ghost" type="button" data-close aria-label="Close">閉じる</button>
        </div>
        <div id="modal-body" class="modal__body"></div>
      </div>
    </div>

    <div id="shipment-workspace-modal" class="modal modal--workspace" aria-hidden="true">
      <div class="modal__backdrop" data-close-workspace-backdrop></div>
      <section class="modal__dialog" role="dialog" aria-modal="true" aria-label="Shipment workspace">
        <button class="workspace-modal__close" type="button" aria-label="閉じる" data-close-workspace>×</button>
        <div class="modal__top">
          <div class="modal__title">Shipment Workspace</div>
        </div>
        <div class="modal__body"></div>
      </section>
    </div>

    <div id="si-workspace-modal" class="modal modal--workspace" aria-hidden="true">
      <div class="modal__backdrop" data-close-workspace-backdrop></div>
      <section class="modal__dialog" role="dialog" aria-modal="true" aria-label="SI workspace">
        <button class="workspace-modal__close" type="button" aria-label="閉じる" data-close-workspace>×</button>
        <div class="modal__top">
          <div class="modal__title">SI Workspace</div>
        </div>
        <div class="modal__body"></div>
      </section>
    </div>

    <div id="document-workspace-modal" class="modal modal--workspace" aria-hidden="true">
      <div class="modal__backdrop" data-close-workspace-backdrop></div>
      <section class="modal__dialog modal__dialog--workspace" role="dialog" aria-modal="true" aria-label="Document workspace">
        <button class="workspace-modal__close" type="button" aria-label="閉じる" data-close-workspace>×</button>
        <div class="modal__top">
          <div class="modal__title">Document Workspace</div>
        </div>
        <div class="modal__body"></div>
      </section>
    </div>

    <div id="operational-thread-modal" class="modal modal--op-thread" aria-hidden="true">
      <div class="modal__backdrop" data-close-op-thread></div>
      <div class="modal__dialog" role="dialog" aria-modal="true" aria-label="Operational Thread detail">
        <div class="modal__top">
          <div class="modal__title">Operational Thread / 業務スレッド</div>
          <button class="btn btn--ghost" type="button" data-close-op-thread aria-label="Close">閉じる</button>
        </div>
        <div id="operational-thread-modal-body" class="modal__body"></div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
